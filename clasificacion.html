<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HA Basket — Clasificación</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --navy:   #0F1D33;
      --yellow: #F7D10C;
      --bg:     #ffffff;
      --card:   #f6f7f9;
      --border: #e2e4e8;
      --text:   #0F1D33;
      --muted:  #6b7280;
      --light:  #9ca3af;
      --ha-bg:  rgba(247,209,12,0.12);
    }

    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Barlow', Arial, sans-serif;
      min-height: 100vh;
    }

    /* ─── HEADER ─── */
    .header-wrap { border-bottom: 1px solid var(--border); }

    header {
      max-width: 1200px;
      margin: 0 auto;
      padding: 18px clamp(20px, 5vw, 80px);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .brand-link {
      text-decoration: none;
      display: flex;
      flex-direction: column;
    }

    .brand-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 26px;
      letter-spacing: 2px;
      color: var(--navy);
    }

    .brand-name span { color: var(--yellow); -webkit-text-stroke: 1px var(--navy); }

    .brand-sub {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: 1px;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--muted);
      text-decoration: none;
      padding: 6px 10px;
      border-radius: 6px;
      transition: background .15s, color .15s;
    }

    .back-link:hover { background: var(--card); color: var(--navy); }

    /* ─── HERO ─── */
    .hero-wrap { border-bottom: 3px solid var(--yellow); }

    .hero {
      max-width: 1200px;
      margin: 0 auto;
      padding: clamp(28px, 4vw, 48px) clamp(20px, 5vw, 80px) clamp(20px, 3vw, 36px);
    }

    .hero-label {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .hero-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(40px, 7vw, 70px);
      line-height: 0.95;
      letter-spacing: 1px;
      color: var(--navy);
    }

    .hero-title em { font-style: normal; color: var(--yellow); -webkit-text-stroke: 1.5px var(--navy); }

    .hero-comp {
      margin-top: 10px;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
    }

    /* ─── MAIN ─── */
    main {
      max-width: 1200px;
      margin: 0 auto;
      padding: clamp(24px, 4vw, 44px) clamp(20px, 5vw, 80px);
    }

    /* ─── TABLE ─── */
    .table-wrap {
      overflow-x: auto;
      border: 1px solid var(--border);
      border-radius: 10px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }

    thead tr {
      background: var(--navy);
      color: #fff;
    }

    thead th {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 10px 14px;
      text-align: center;
      white-space: nowrap;
    }

    thead th.col-equipo { text-align: left; }

    tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background .12s;
    }

    tbody tr:last-child { border-bottom: none; }

    tbody tr:hover { background: var(--card); }

    /* HA Basket row highlight */
    tbody tr.ha-row {
      background: var(--ha-bg);
    }

    tbody tr.ha-row:hover { background: rgba(247,209,12,0.2); }

    td {
      padding: 11px 14px;
      text-align: center;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: .3px;
      white-space: nowrap;
    }

    td.col-equipo {
      text-align: left;
      font-size: 15px;
      font-weight: 700;
    }

    .ha-row td.col-equipo { color: var(--navy); }

    td.col-pos {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 18px;
      color: var(--muted);
      width: 40px;
    }

    .ha-row td.col-pos { color: var(--navy); }

    td.col-pts {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 18px;
      color: var(--navy);
    }

    /* Top 3 position badges */
    .pos-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 26px;
      height: 26px;
      border-radius: 50%;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 15px;
    }

    .pos-1 { background: #f59e0b; color: #fff; }
    .pos-2 { background: #94a3b8; color: #fff; }
    .pos-3 { background: #b45309; color: #fff; }

    /* ─── States ─── */
    .loading {
      padding: 60px 0;
      text-align: center;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--light);
    }

    .error-msg {
      padding: 48px 24px;
      text-align: center;
    }

    .error-msg h2 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 32px;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .error-msg p { font-size: 14px; color: var(--light); }

    .fbm-link {
      display: inline-block;
      margin-top: 16px;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--navy);
      text-decoration: none;
      border: 1px solid var(--border);
      padding: 7px 16px;
      border-radius: 6px;
      transition: background .15s;
    }

    .fbm-link:hover { background: var(--card); }

    /* ─── Legend ─── */
    .legend {
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
      margin-top: 16px;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--muted);
    }

    .legend-ha {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--yellow);
      border: 1.5px solid var(--navy);
    }

    /* ─── FOOTER ─── */
    .footer-wrap { border-top: 1px solid var(--border); margin-top: 32px; }

    footer {
      max-width: 1200px;
      margin: 0 auto;
      padding: 16px clamp(20px, 5vw, 80px);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 8px;
    }

    .footer-brand {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
    }

    .footer-updated { font-size: 12px; color: var(--light); }

    @media (max-width: 600px) {
      td, thead th { padding: 9px 8px; font-size: 12px; }
      td.col-equipo { font-size: 13px; }
    }
  </style>
</head>
<body>

  <div class="header-wrap">
    <header>
      <a class="brand-link" href="index.html">
        <div class="brand-name">HA <span>BASKET</span></div>
        <div class="brand-sub">Highstep Academy · Club de Baloncesto</div>
      </a>
      <a class="back-link" href="index.html">
        ← Partidos
      </a>
    </header>
  </div>

  <div class="hero-wrap">
    <section class="hero">
      <div class="hero-label">Clasificación</div>
      <h1 class="hero-title" id="hero-title">CARGANDO<br><em>DATOS</em></h1>
      <div class="hero-comp" id="hero-comp"></div>
    </section>
  </div>

  <main id="main">
    <div class="loading">Cargando clasificación...</div>
  </main>

  <div class="footer-wrap">
    <footer>
      <span class="footer-brand">HA Basket · Highstep Academy</span>
      <span class="footer-updated" id="updated"></span>
    </footer>
  </div>

  <script>
    // Known column aliases → canonical key
    const COL_MAP = {
      // position
      'POS': 'pos', 'POSICIÓN': 'pos', 'POSICION': 'pos', '#': 'pos',
      // team
      'EQUIPO': 'equipo', 'CLUB': 'equipo', 'NOMBRE': 'equipo',
      // played
      'PJ': 'pj', 'J': 'pj', 'JUGADOS': 'pj', 'PARTIDOS': 'pj',
      // won
      'PG': 'pg', 'G': 'pg', 'GANADOS': 'pg',
      // lost
      'PP': 'pp', 'P': 'pp', 'PERDIDOS': 'pp',
      // points for
      'PF': 'pf', 'AF': 'pf', 'FAVOR': 'pf', 'PUNTOS A FAVOR': 'pf',
      // points against
      'PC': 'pc', 'AC': 'pc', 'CONTRA': 'pc', 'PUNTOS EN CONTRA': 'pc',
      // average / diferencia
      'AVG': 'avg', 'DIF': 'avg', 'DIFERENCIA': 'avg', 'AVERAGE': 'avg',
      // points
      'PTS': 'pts', 'PUNTOS': 'pts', 'CLASIF': 'pts',
    };

    function normalize(row) {
      const out = {};
      for (const [k, v] of Object.entries(row)) {
        const canonical = COL_MAP[k.trim().toUpperCase()] || k.trim().toLowerCase();
        out[canonical] = v;
      }
      return out;
    }

    function isHA(name) {
      return (name || '').toUpperCase().includes('HA BASKET') ||
             (name || '').toUpperCase().includes('HIGHSTEP');
    }

    function renderTable(equipos) {
      if (!equipos || equipos.length === 0) return null;

      const rows = equipos.map(normalize);

      // Detect available columns from first row
      const first = rows[0];
      const hasPJ  = 'pj'  in first;
      const hasPG  = 'pg'  in first;
      const hasPP  = 'pp'  in first;
      const hasPF  = 'pf'  in first;
      const hasPC  = 'pc'  in first;
      const hasAvg = 'avg' in first;
      const hasPts = 'pts' in first;

      const thead = `
        <thead>
          <tr>
            <th class="col-pos">#</th>
            <th class="col-equipo">Equipo</th>
            ${hasPJ  ? '<th>PJ</th>'  : ''}
            ${hasPG  ? '<th>PG</th>'  : ''}
            ${hasPP  ? '<th>PP</th>'  : ''}
            ${hasPF  ? '<th>PF</th>'  : ''}
            ${hasPC  ? '<th>PC</th>'  : ''}
            ${hasAvg ? '<th>AVG</th>' : ''}
            ${hasPts ? '<th>PTS</th>' : ''}
          </tr>
        </thead>`;

      const tbody = rows.map((r, i) => {
        const pos = r.pos || String(i + 1);
        const posNum = parseInt(pos, 10);
        const posBadge = posNum <= 3
          ? `<span class="pos-badge pos-${posNum}">${posNum}</span>`
          : pos;

        const teamName = r.equipo || r.nombre || Object.values(r)[1] || '—';
        const haRow = isHA(teamName);

        return `
          <tr class="${haRow ? 'ha-row' : ''}">
            <td class="col-pos">${posBadge}</td>
            <td class="col-equipo">${teamName}</td>
            ${hasPJ  ? `<td>${r.pj  || '—'}</td>` : ''}
            ${hasPG  ? `<td>${r.pg  || '—'}</td>` : ''}
            ${hasPP  ? `<td>${r.pp  || '—'}</td>` : ''}
            ${hasPF  ? `<td>${r.pf  || '—'}</td>` : ''}
            ${hasPC  ? `<td>${r.pc  || '—'}</td>` : ''}
            ${hasAvg ? `<td>${r.avg || '—'}</td>` : ''}
            ${hasPts ? `<td class="col-pts">${r.pts || '—'}</td>` : ''}
          </tr>`;
      }).join('');

      return `<table>${thead}<tbody>${tbody}</tbody></table>`;
    }

    async function cargarClasificacion() {
      const params = new URLSearchParams(window.location.search);
      const id     = params.get('id');

      if (!id) {
        document.getElementById('main').innerHTML = `
          <div class="error-msg">
            <h2>Categoría no especificada</h2>
            <p>No se indicó ninguna categoría en la URL.</p>
            <a class="fbm-link" href="index.html">← Volver a partidos</a>
          </div>`;
        return;
      }

      try {
        const res  = await fetch('./public/clasificaciones.json?t=' + Date.now());
        const data = await res.json();

        const entry = data.clasificaciones.find(c => c.id === id);

        if (!entry) {
          document.getElementById('main').innerHTML = `
            <div class="error-msg">
              <h2>Sin datos</h2>
              <p>No se encontró clasificación para esta categoría todavía.</p>
              <a class="fbm-link" href="index.html">← Volver a partidos</a>
            </div>`;
          document.getElementById('hero-title').innerHTML = 'SIN<br><em>DATOS</em>';
          return;
        }

        // Update hero
        const titleLines = entry.nombre.split(' ');
        const mid = Math.ceil(titleLines.length / 2);
        document.getElementById('hero-title').innerHTML =
          titleLines.slice(0, mid).join(' ') + '<br><em>' + (titleLines.slice(mid).join(' ') || '&nbsp;') + '</em>';

        if (entry.competicion) {
          document.getElementById('hero-comp').textContent = entry.competicion;
        }

        document.title = `HA Basket — ${entry.nombre}`;

        // Render table
        const main = document.getElementById('main');

        if (!entry.equipos || entry.equipos.length === 0) {
          main.innerHTML = `
            <div class="error-msg">
              <h2>Datos no disponibles</h2>
              <p>La clasificación aún no está publicada o no se pudo extraer.</p>
              ${entry.url ? `<a class="fbm-link" href="${entry.url}" target="_blank" rel="noopener">Ver en FBM →</a>` : ''}
              <br><a class="fbm-link" href="index.html" style="margin-top:8px">← Volver a partidos</a>
            </div>`;
          return;
        }

        const tableHTML = renderTable(entry.equipos);

        main.innerHTML = `
          <div class="table-wrap">
            ${tableHTML || '<p style="padding:24px;color:var(--muted)">No se pudieron interpretar los datos.</p>'}
          </div>
          <div class="legend">
            <div class="legend-ha">
              <div class="legend-dot"></div>
              HA Basket / Highstep Academy
            </div>
          </div>
          ${entry.url ? `<p style="margin-top:20px"><a class="fbm-link" href="${entry.url}" target="_blank" rel="noopener">Ver en FBM →</a></p>` : ''}
        `;

        document.getElementById('updated').textContent =
          'Actualizado: ' + new Date(data.actualizado).toLocaleString('es-ES');

      } catch (err) {
        console.error(err);
        document.getElementById('main').innerHTML = `
          <div class="error-msg">
            <h2>Error de carga</h2>
            <p>No se pudo leer clasificaciones.json</p>
            <a class="fbm-link" href="index.html">← Volver a partidos</a>
          </div>`;
      }
    }

    cargarClasificacion();
  </script>
</body>
</html>
