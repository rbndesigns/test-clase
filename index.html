<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>HA Basket</title>

<style>

body{
  margin:0;
  background:#0b0b0b;
  color:white;
  font-family:Arial,sans-serif;
}

.container{
  max-width:1200px;
  margin:auto;
  padding:40px 20px;
}

h1{
  font-size:64px;
  margin-bottom:10px;
}

.sub{
  opacity:.6;
  margin-bottom:50px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
  gap:20px;
}

.card{
  background:#151515;
  border:1px solid #262626;
  border-radius:16px;
  overflow:hidden;
}

.top{
  background:#1f1f1f;
  padding:18px;
  border-bottom:1px solid #2e2e2e;
}

.fecha{
  font-size:32px;
  font-weight:bold;
}

.hora{
  opacity:.7;
  margin-top:4px;
}

.body{
  padding:22px;
}

.cat{
  display:inline-block;
  background:#ff7b00;
  color:white;
  text-decoration:none;
  padding:8px 12px;
  border-radius:999px;
  font-size:13px;
  margin-bottom:20px;
}

.cat:hover{
  opacity:.8;
}

.eq{
  font-size:22px;
  font-weight:bold;
  margin:8px 0;
}

.vs{
  opacity:.5;
  margin:12px 0;
}

.comp{
  margin-top:20px;
  opacity:.7;
  line-height:1.5;
}

.campo{
  margin-top:18px;
  padding-top:18px;
  border-top:1px solid #2a2a2a;
  opacity:.75;
  font-size:14px;
}

.empty{
  opacity:.5;
}

</style>
</head>
<body>

<div class="container">

  <h1>🏀 HA Basket</h1>

  <div class="sub">
    Próximos partidos actualizados automáticamente desde FBM
  </div>

  <div class="grid" id="partidos"></div>

</div>

<script>

function parseFecha(str){

  const [fecha,hora] = str.split(' ');

  const [d,m,y] = fecha.split('/');

  return {
    dia:d,
    mes:m,
    año:y,
    hora:hora || ''
  };

}

async function cargar(){

  try{

    const res = await fetch('./public/partidos.json?t=' + Date.now());

    const data = await res.json();

    const container = document.getElementById('partidos');

    if(!data.partidos || data.partidos.length === 0){

      container.innerHTML =
        '<div class="empty">No hay partidos disponibles.</div>';

      return;

    }

    data.partidos.forEach(partido => {

      const catLines =
        partido.categoria
          .split('\n')
          .map(t => t.trim())
          .filter(Boolean);

      const eqLines =
        partido.encuentro
          .split('\n')
          .map(t => t.trim())
          .filter(Boolean);

      const campoLines =
        partido.campo
          .split('\n')
          .map(t => t.trim())
          .filter(Boolean);

      const categoria = catLines[0] || '';

      const competicion = catLines[1] || '';

      const fase = catLines[2] || '';

      const eq1 = eqLines[0] || '';

      const eq2 = eqLines[1] || '';

      const fecha = parseFecha(partido.fecha);

      const card = document.createElement('div');

      card.className = 'card';

      card.innerHTML = `

        <div class="top">

          <div class="fecha">
            ${fecha.dia}/${fecha.mes}
          </div>

          <div class="hora">
            ${fecha.hora}
          </div>

        </div>

        <div class="body">

          <a
            class="cat"
            href="./clasificacion.html?categoria=${encodeURIComponent(categoria)}"
          >
            ${categoria}
          </a>

          <div class="eq">${eq1}</div>

          <div class="vs">VS</div>

          <div class="eq">${eq2}</div>

          <div class="comp">
            ${competicion}<br>
            ${fase}
          </div>

          <div class="campo">
            📍 ${campoLines.join(' · ')}
          </div>

        </div>

      `;

      container.appendChild(card);

    });

  }catch(err){

    console.error(err);

    document.getElementById('partidos').innerHTML =
      '<div class="empty">Error cargando datos.</div>';

  }

}

cargar();

</script>

</body>
</html>
