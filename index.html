<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HA Basket — Próximos Partidos</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --navy:   #0F1D33;
      --navy-2: #162236;
      --navy-3: #1e2f47;
      --yellow: #F7D10C;
      --yellow-dim: rgba(247,209,12,0.12);
      --white:  #ffffff;
      --white-60: rgba(255,255,255,0.6);
      --white-30: rgba(255,255,255,0.3);
      --white-10: rgba(255,255,255,0.08);
    }

    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--navy);
      color: var(--white);
      font-family: 'Barlow', Arial, sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ─── Noise texture overlay ─── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
    }

    /* ─── HEADER ─── */
    header {
      position: relative;
      z-index: 1;
      padding: 0 clamp(20px, 5vw, 80px);
      border-bottom: 1px solid var(--white-10);
    }

    .header-inner {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 0 18px;
      gap: 16px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    /* SVG shield icon inline — matches brand symbol silhouette */
    .brand-icon {
      width: 48px;
      height: 48px;
      flex-shrink: 0;
    }

    .brand-text {}

    .brand-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 32px;
      letter-spacing: 2px;
      line-height: 1;
      color: var(--white);
    }

    .brand-name span {
      color: var(--yellow);
    }

    .brand-sub {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--white-60);
      margin-top: 2px;
    }

    .header-badge {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--navy);
      background: var(--yellow);
      padding: 5px 12px;
      border-radius: 3px;
    }

    /* ─── HERO STRIPE ─── */
    .hero {
      position: relative;
      z-index: 1;
      padding: clamp(36px, 6vw, 64px) clamp(20px, 5vw, 80px) clamp(28px, 4vw, 48px);
      border-bottom: 2px solid var(--yellow);
    }

    .hero-inner {
      max-width: 1200px;
      margin: 0 auto;
    }

    .hero-label {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--yellow);
      margin-bottom: 10px;
    }

    .hero-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(52px, 9vw, 96px);
      line-height: 0.9;
      letter-spacing: 2px;
      color: var(--white);
    }

    .hero-title em {
      color: var(--yellow);
      font-style: normal;
    }

    .hero-meta {
      margin-top: 16px;
      font-family: 'Barlow', sans-serif;
      font-size: 14px;
      color: var(--white-60);
    }

    /* ─── MAIN ─── */
    main {
      position: relative;
      z-index: 1;
      padding: clamp(32px, 5vw, 56px) clamp(20px, 5vw, 80px);
    }

    .main-inner {
      max-width: 1200px;
      margin: 0 auto;
    }

    /* ─── SECTION LABEL ─── */
    .section-label {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 28px;
    }

    .section-label::before {
      content: '';
      display: block;
      width: 4px;
      height: 22px;
      background: var(--yellow);
      border-radius: 2px;
      flex-shrink: 0;
    }

    .section-label span {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--white-60);
    }

    /* ─── GRID ─── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 20px;
    }

    /* ─── MATCH CARD ─── */
    .card {
      background: var(--navy-2);
      border: 1px solid var(--white-10);
      border-radius: 12px;
      overflow: hidden;
      transition: transform 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
      display: flex;
      flex-direction: column;
    }

    .card:hover {
      transform: translateY(-3px);
      border-color: var(--yellow);
      box-shadow: 0 8px 32px rgba(247, 209, 12, 0.1);
    }

    /* Card top strip */
    .card-header {
      display: flex;
      align-items: stretch;
      border-bottom: 1px solid var(--white-10);
    }

    .card-fecha-block {
      background: var(--yellow);
      color: var(--navy);
      padding: 12px 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-width: 72px;
      text-align: center;
      flex-shrink: 0;
    }

    .card-dia-num {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 36px;
      line-height: 1;
    }

    .card-mes {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-top: 1px;
    }

    .card-dia-semana {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      opacity: 0.75;
      margin-top: 2px;
    }

    .card-meta {
      flex: 1;
      padding: 12px 16px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 4px;
    }

    .card-hora {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 1.5px;
      color: var(--white);
    }

    .card-hora::before {
      content: '⏱';
      font-size: 11px;
    }

    .card-categoria-pill {
      display: inline-block;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--yellow);
      background: var(--yellow-dim);
      border: 1px solid rgba(247,209,12,0.25);
      padding: 2px 8px;
      border-radius: 3px;
      max-width: fit-content;
    }

    /* Card body */
    .card-body {
      padding: 20px 20px 16px;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    /* Encounter */
    .encuentro-wrapper {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .equipo-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .equipo-indicator {
      width: 3px;
      height: 28px;
      border-radius: 2px;
      background: var(--white-30);
      flex-shrink: 0;
    }

    .equipo-indicator.local {
      background: var(--yellow);
    }

    .equipo-nombre {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 20px;
      font-weight: 700;
      letter-spacing: 0.5px;
      line-height: 1.15;
      color: var(--white);
    }

    .equipo-nombre.ha-basket {
      color: var(--yellow);
    }

    .vs-divider {
      display: flex;
      align-items: center;
      gap: 8px;
      padding-left: 13px;
    }

    .vs-divider::before,
    .vs-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--white-10);
    }

    .vs-text {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 13px;
      letter-spacing: 2px;
      color: var(--white-30);
    }

    /* Competition info */
    .competicion-info {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .competicion-nombre {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.5px;
      color: var(--white-60);
      text-transform: uppercase;
    }

    .fase-badge {
      display: inline-block;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--white-60);
      border: 1px solid var(--white-10);
      padding: 2px 7px;
      border-radius: 3px;
      max-width: fit-content;
    }

    /* Card footer — venue */
    .card-footer {
      border-top: 1px solid var(--white-10);
      padding: 12px 20px;
      display: flex;
      align-items: flex-start;
      gap: 8px;
    }

    .venue-icon {
      font-size: 13px;
      margin-top: 1px;
      flex-shrink: 0;
    }

    .venue-info {
      display: flex;
      flex-direction: column;
      gap: 1px;
    }

    .venue-nombre {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.5px;
      color: var(--white);
      text-transform: uppercase;
    }

    .venue-dir {
      font-family: 'Barlow', sans-serif;
      font-size: 12px;
      color: var(--white-60);
      line-height: 1.4;
    }

    /* ─── EMPTY / ERROR ─── */
    .estado {
      grid-column: 1 / -1;
      padding: 60px 24px;
      text-align: center;
    }

    .estado-titulo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 36px;
      letter-spacing: 2px;
      color: var(--white-60);
      margin-bottom: 8px;
    }

    .estado-sub {
      font-size: 14px;
      color: var(--white-30);
    }

    /* Loading skeleton */
    .skeleton {
      background: var(--navy-2);
      border: 1px solid var(--white-10);
      border-radius: 12px;
      height: 220px;
      animation: skeleton-pulse 1.4s ease-in-out infinite;
    }

    @keyframes skeleton-pulse {
      0%, 100% { opacity: 0.5; }
      50%       { opacity: 1; }
    }

    /* ─── FOOTER ─── */
    footer {
      position: relative;
      z-index: 1;
      padding: 20px clamp(20px, 5vw, 80px);
      border-top: 1px solid var(--white-10);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 10px;
    }

    .footer-inner {
      max-width: 1200px;
      width: 100%;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 10px;
    }

    .footer-brand {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--white-60);
    }

    .footer-updated {
      font-size: 12px;
      color: var(--white-30);
    }

    /* ─── Responsive ─── */
    @media (max-width: 600px) {
      .grid {
        grid-template-columns: 1fr;
      }
      .hero-title {
        font-size: 52px;
      }
    }

    /* ─── Fade-in cards ─── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card {
      animation: fadeUp 0.4s ease both;
    }
  </style>
</head>
<body>

  <!-- ─── HEADER ─── -->
  <header>
    <div class="header-inner">
      <div class="brand">
        <!-- Inline SVG shield/warrior icon matching HA Basket symbol -->
        <svg class="brand-icon" viewBox="0 0 48 52" fill="none" xmlns="http://www.w3.org/2000/svg">
          <!-- shield base -->
          <path d="M24 2L4 10V28C4 39 13 47 24 50C35 47 44 39 44 28V10L24 2Z" fill="#F7D10C" opacity="0.15" stroke="#F7D10C" stroke-width="1.5"/>
          <!-- basketball lines on head -->
          <circle cx="24" cy="18" r="8" fill="none" stroke="#F7D10C" stroke-width="1.5"/>
          <path d="M16 18H32M24 10V26M18 12.5C20 16 20 20 18 23.5M30 12.5C28 16 28 20 30 23.5" stroke="#F7D10C" stroke-width="1"/>
          <!-- wings hint -->
          <path d="M8 20L4 16L8 22" stroke="#F7D10C" stroke-width="1.5" stroke-linecap="round"/>
          <path d="M40 20L44 16L40 22" stroke="#F7D10C" stroke-width="1.5" stroke-linecap="round"/>
          <!-- face -->
          <path d="M20 24.5C20 24.5 21.5 26 24 26C26.5 26 28 24.5 28 24.5" stroke="#F7D10C" stroke-width="1.2" stroke-linecap="round" fill="none"/>
          <!-- HA text bottom -->
          <text x="24" y="45" text-anchor="middle" font-family="'Bebas Neue',sans-serif" font-size="8" fill="#F7D10C" letter-spacing="2">HAB</text>
        </svg>
        <div class="brand-text">
          <div class="brand-name">HA <span>BASKET</span></div>
          <div class="brand-sub">Highstep Academy · Club de Baloncesto</div>
        </div>
      </div>
      <div class="header-badge">habasket.es</div>
    </div>
  </header>

  <!-- ─── HERO ─── -->
  <section class="hero">
    <div class="hero-inner">
      <div class="hero-label">Calendario competición</div>
      <h1 class="hero-title">PRÓXIMOS<br><em>PARTIDOS</em></h1>
      <p class="hero-meta">Datos actualizados automáticamente desde la Federación de Baloncesto de Madrid</p>
    </div>
  </section>

  <!-- ─── MAIN ─── -->
  <main>
    <div class="main-inner">

      <div class="section-label">
        <span id="conteo">Cargando partidos...</span>
      </div>

      <div class="grid" id="partidos">
        <!-- Skeletons while loading -->
        <div class="skeleton"></div>
        <div class="skeleton"></div>
        <div class="skeleton"></div>
      </div>

    </div>
  </main>

  <!-- ─── FOOTER ─── -->
  <footer>
    <div class="footer-inner">
      <span class="footer-brand">HA Basket · Highstep Academy</span>
      <span class="footer-updated" id="updated"></span>
    </div>
  </footer>

  <script>

    /* ── Helpers ── */
    const MESES = ['ENE','FEB','MAR','ABR','MAY','JUN','JUL','AGO','SEP','OCT','NOV','DIC'];
    const DIAS  = ['DOM','LUN','MAR','MIÉ','JUE','VIE','SÁB'];

    function parseFecha(str) {
      // "16/05/2026 09:00"
      const [datePart, timePart] = str.split(' ');
      const [d, m, y] = datePart.split('/').map(Number);
      const date = new Date(y, m - 1, d);
      return {
        diaNum:    String(d).padStart(2,'0'),
        mes:       MESES[m - 1],
        diaSemana: DIAS[date.getDay()],
        hora:      timePart || ''
      };
    }

    function isHABasket(nombre) {
      return nombre.toUpperCase().includes('HA BASKET') ||
             nombre.toUpperCase().includes('HA BASKET');
    }

    function renderPartido(partido, index) {
      const { diaNum, mes, diaSemana, hora } = parseFecha(partido.fecha);

      // Split multi-line fields
      const catLines   = partido.categoria.split('\n').map(s => s.trim()).filter(Boolean);
      const eqLines    = partido.encuentro.split('\n').map(s => s.trim()).filter(Boolean);
      const campoLines = partido.campo.split('\n').map(s => s.trim()).filter(Boolean);

      const ageGroup    = catLines[0]  || '';
      const competicion = catLines[1]  || '';
      const fase        = catLines[2]  || '';

      const eq1 = eqLines[0] || '';
      const eq2 = eqLines[1] || '';

      const venueNombre = campoLines[0] || '';
      const venueDir    = campoLines.slice(1).join(' — ') || '';

      const eq1IsHA = isHABasket(eq1);
      const eq2IsHA = isHABasket(eq2);

      // Determine home/away: in basketball fixtures the home team is usually listed first
      const eq1Local = true; // first listed = home
      const eq2Local = false;

      const card = document.createElement('div');
      card.className = 'card';
      card.style.animationDelay = (index * 80) + 'ms';

      card.innerHTML = `
        <div class="card-header">
          <div class="card-fecha-block">
            <div class="card-dia-num">${diaNum}</div>
            <div class="card-mes">${mes}</div>
            <div class="card-dia-semana">${diaSemana}</div>
          </div>
          <div class="card-meta">
            <div class="card-hora">${hora}h</div>
            <div class="card-categoria-pill">${ageGroup}</div>
          </div>
        </div>

        <div class="card-body">

          <div class="encuentro-wrapper">
            <div class="equipo-row">
              <div class="equipo-indicator ${eq1Local ? 'local' : ''}"></div>
              <div class="equipo-nombre ${eq1IsHA ? 'ha-basket' : ''}">${eq1}</div>
            </div>
            <div class="vs-divider"><span class="vs-text">VS</span></div>
            <div class="equipo-row">
              <div class="equipo-indicator ${eq2Local ? 'local' : ''}"></div>
              <div class="equipo-nombre ${eq2IsHA ? 'ha-basket' : ''}">${eq2}</div>
            </div>
          </div>

          <div class="competicion-info">
            ${competicion ? `<div class="competicion-nombre">${competicion}</div>` : ''}
            ${fase        ? `<div class="fase-badge">${fase}</div>` : ''}
          </div>

        </div>

        <div class="card-footer">
          <span class="venue-icon">📍</span>
          <div class="venue-info">
            <div class="venue-nombre">${venueNombre}</div>
            ${venueDir ? `<div class="venue-dir">${venueDir}</div>` : ''}
          </div>
        </div>
      `;

      return card;
    }

    /* ── Main loader ── */
    async function cargarPartidos() {
      try {
        const response = await fetch('./public/partidos.json?t=' + Date.now());
        const data     = await response.json();

        const container = document.getElementById('partidos');
        const conteo    = document.getElementById('conteo');
        container.innerHTML = '';

        if (!data.partidos || data.partidos.length === 0) {
          conteo.textContent = '0 partidos disponibles';
          container.innerHTML = `
            <div class="estado">
              <div class="estado-titulo">Sin partidos</div>
              <div class="estado-sub">No hay partidos programados en este momento.</div>
            </div>
          `;
          return;
        }

        const total = data.partidos.length;
        conteo.textContent = total + ' partido' + (total !== 1 ? 's' : '') + ' programado' + (total !== 1 ? 's' : '');

        data.partidos.forEach((partido, i) => {
          container.appendChild(renderPartido(partido, i));
        });

        document.getElementById('updated').textContent =
          'Última actualización: ' +
          new Date(data.actualizado).toLocaleString('es-ES');

      } catch (err) {
        console.error(err);
        document.getElementById('conteo').textContent = 'Error al cargar';
        document.getElementById('partidos').innerHTML = `
          <div class="estado">
            <div class="estado-titulo">Error de carga</div>
            <div class="estado-sub">No se pudo leer el archivo partidos.json</div>
          </div>
        `;
      }
    }

    cargarPartidos();

  </script>
</body>
</html>
