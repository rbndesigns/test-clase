name: Scraper Partidos HA Basket

on:

  workflow_dispatch:

  schedule:
    - cron: '0 1 * * *'

jobs:

  scrape:

    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:

      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Instalar dependencias
        run: npm install

      - name: Instalar Chrome
        run: npx puppeteer browsers install chrome

      - name: Ejecutar scraper
        run: node scraper.js

      - name: Commit partidos.json
        run: |

          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add public/partidos.json
          git add public/clasificaciones.json

          git commit -m "update partidos" || echo "No changes"

          git push

      - name: Subir artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: partidos
          path: public/partidos.json
          if-no-files-found: warn
